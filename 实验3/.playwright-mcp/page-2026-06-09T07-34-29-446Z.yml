    - generic [ref=e37]:
      - heading "1、产品概述" [level=1] [ref=e38]
      - paragraph [ref=e39]: 物联网设计与开发竞赛实训平台由蓝桥杯大赛技术支持单位北京四梯科技有限公司设计和生产，该产品可用于参加蓝桥杯物联网设计与开发赛道的竞赛实训或院校相关课程的实践教学环节。
      - paragraph [ref=e40]: 产品基于 STM32WLE5 Sub-GHz 无线微控制器设计，芯片提供了 256KB FLASH 和 64KB SRAM 存储器，最高主频 48MHz，内部集成 ARM Cortex M4 内核和无线通讯单元，支持 LoRa ®、(G)FSK、(G)MSK 和 BPSK 调试模式。产品配置按键、指示灯、调试器、OLED 显示屏、通用传感器接口、EEPROM 存储器等 MCU 典型外围器件，单 USB Type C 接口 供电，支持串口通讯、程序下载和在线调试功能。
      - paragraph [ref=e41]: 主要特点
      - list [ref=e42]:
        - listitem [ref=e43]:
          - paragraph [ref=e44]: 高集成性，集成了典型功能模块，为用户提供完整的实验环境。
        - listitem [ref=e45]:
          - paragraph [ref=e46]: 通信方式，支持 LoRa®、(G)FSK、(G)MSK 和 BPSK 等多种调试模式。
        - listitem [ref=e47]:
          - paragraph [ref=e48]: 开发生态，支持 STM32 Cube MX/ ARM-MDK 开发工具与环境，生态友好。
        - listitem [ref=e49]:
          - paragraph [ref=e50]: 可扩展性，引出 TIM/SPI/I2C/ADC/USART 等 MCU 核心外设，可扩展性强。
        - listitem [ref=e51]:
          - paragraph [ref=e52]: 结构灵活，提供一体式、分体式两种解决方案，适用不同场景需求。
        - listitem [ref=e53]:
          - paragraph [ref=e54]: 易于教学，产品设计简单，接口、结构清晰，提供教材、视频课件支持，非常适合 用于院校实践教学，能够帮助学生快速上手并掌握物联网开发的基本技能。
      - paragraph [ref=e55]:
        - img "img" [ref=e56]
      - paragraph [ref=e57]:
